name: Sync upstream

on:
  schedule:
    # Every Monday at 09:00 UTC.
    - cron: '0 9 * * 1'
  workflow_dispatch: {}

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync-main:
    name: Sync main from lightphone/light-sdk
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      main-sha: ${{ steps.ff.outputs.sha }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "light-tools sync bot"
          git config user.email "actions@users.noreply.github.com"

      - name: Fetch and merge from upstream
        id: ff
        # main carries fork-only commits (this workflow), so a fast-forward can
        # never succeed — merge instead, recording the incoming upstream commits
        # in the merge commit body.
        run: |
          git remote add upstream https://github.com/lightphone/light-sdk.git
          git fetch upstream main
          summary=$(git log --oneline --no-decorate HEAD..upstream/main)
          if [ -n "$summary" ]; then
            git merge upstream/main -m "Merge upstream lightphone/light-sdk main" -m "Upstream changes:" -m "$summary"
          else
            echo "Already up to date with upstream."
          fi
          git push origin main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  sync-branches:
    name: Merge main into ${{ matrix.branch }}
    needs: sync-main
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        branch: [sudoku, ledger, chess]
    steps:
      - name: Checkout ${{ matrix.branch }}
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "light-tools sync bot"
          git config user.email "actions@users.noreply.github.com"

      - name: Check for an already-open conflict-resolution PR
        id: check-pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sync_branch="sync/main-into-${{ matrix.branch }}"
          existing_pr=$(gh pr list --head "$sync_branch" --base "${{ matrix.branch }}" --state open --json number --jq '.[0].number // empty')
          echo "sync_branch=$sync_branch" >> "$GITHUB_OUTPUT"
          echo "existing_pr=$existing_pr" >> "$GITHUB_OUTPUT"

      - name: Attempt merge from main
        id: merge
        if: steps.check-pr.outputs.existing_pr == ''
        run: |
          summary=$(git log --oneline --no-decorate HEAD..origin/main)
          if git merge origin/main -m "Merge main into ${{ matrix.branch }}" -m "Upstream changes:" -m "$summary"; then
            echo "conflict=false" >> "$GITHUB_OUTPUT"
          elif [ -n "$(git ls-files -u)" ]; then
            echo "conflict=true" >> "$GITHUB_OUTPUT"
            git add -A
            git commit -m "Merge main into ${{ matrix.branch }} (conflicts need manual resolution)"
          else
            echo "::error::git merge failed for a reason other than a content conflict" >&2
            exit 1
          fi

      - name: Push clean merge directly
        if: steps.check-pr.outputs.existing_pr == '' && steps.merge.outputs.conflict == 'false'
        run: git push origin HEAD:${{ matrix.branch }}

      - name: Push conflicted merge to a sync branch and open a PR
        if: steps.check-pr.outputs.existing_pr == '' && steps.merge.outputs.conflict == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git push origin HEAD:"${{ steps.check-pr.outputs.sync_branch }}"
          gh pr create \
            --base "${{ matrix.branch }}" \
            --head "${{ steps.check-pr.outputs.sync_branch }}" \
            --title "Sync main into ${{ matrix.branch }}: manual conflict resolution needed" \
            --body "The scheduled upstream sync could not cleanly merge \`main\` into \`${{ matrix.branch }}\`. This PR contains the conflicted merge — please resolve the conflict markers locally and push fixes to \`${{ steps.check-pr.outputs.sync_branch }}\`. This automation will not touch this branch again until this PR is closed or merged, so your fixes are safe here."

      - name: Skip — conflict-resolution PR already open
        if: steps.check-pr.outputs.existing_pr != ''
        # Block scalar: on a plain "run:" line, YAML would treat " #..." as a
        # comment and truncate the script to `echo "PR` (unmatched quote).
        run: |
          echo "PR #${{ steps.check-pr.outputs.existing_pr }} is already open for ${{ matrix.branch }}; leaving it alone until it's resolved."
